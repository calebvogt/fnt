name: Build Standalone Executables

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install torch torchvision
          pip install -e .

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Build executable with PyInstaller
        run: |
          pyinstaller fnt.spec

      - name: Zip the output (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist\fnt -DestinationPath fnt-windows.zip

      - name: Zip the output (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../fnt-macos.zip fnt

      - name: Package the output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czf ../fnt-linux.tar.gz fnt

      - name: Upload Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fnt-windows
          path: fnt-windows.zip
          retention-days: 5

      - name: Upload Artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fnt-macos
          path: fnt-macos.zip
          retention-days: 5

      - name: Upload Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fnt-linux
          path: fnt-linux.tar.gz
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: fnt-windows
          path: release-assets
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: fnt-macos
          path: release-assets
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: fnt-linux
          path: release-assets
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
