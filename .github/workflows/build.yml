name: Build Standalone Executables

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  bump_version:
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bump Version
        id: bump
        run: |
          python -c "
          import sys, os
          with open('pyproject.toml', 'r') as f:
              lines = f.readlines()
          new_version = None
          for i, line in enumerate(lines):
              if line.startswith('version = '):
                  v = line.split('=')[1].strip().strip('\"').strip(\"'\")
                  parts = v.split('.')
                  parts[-1] = str(int(parts[-1]) + 1)
                  new_version = '.'.join(parts)
                  lines[i] = f'version = \"{new_version}\"\n'
                  break
          if not new_version:
              sys.exit('Version not found')
          with open('pyproject.toml', 'w') as f:
              f.writelines(lines)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'new_tag=v{new_version}\n')
          "

      - name: Commit and Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin main
          git push origin ${{ steps.bump.outputs.new_tag }}

  build:
    name: Build on ${{ matrix.os }}
    needs: bump_version
    if: always() && (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump_version.outputs.new_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install torch torchvision
          pip install -e .

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Build executable with PyInstaller
        run: |
          pyinstaller fnt.spec

      - name: Zip the output (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist\fnt -DestinationPath fnt-windows.zip

      - name: Zip the output (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../fnt-macos.zip fnt

      - name: Package the output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czf ../fnt-linux.tar.gz fnt

      - name: Upload Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fnt-windows
          path: fnt-windows.zip
          retention-days: 5

      - name: Upload Artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fnt-macos
          path: fnt-macos.zip
          retention-days: 5

      - name: Upload Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fnt-linux
          path: fnt-linux.tar.gz
          retention-days: 5

  release:
    needs: [bump_version, build]
    if: always() && (needs.build.result == 'success') && (needs.bump_version.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: fnt-windows
          path: release-assets
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: fnt-macos
          path: release-assets
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: fnt-linux
          path: release-assets
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump_version.outputs.new_tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
